<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi TV y Radio Personal</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: #eee; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #0f0; }
        .formulario { background: #1a1a1a; padding: 20px; border-radius: 12px; margin-bottom: 30px; max-width: 900px; margin-left: auto; margin-right: auto; }
        input, select, button { padding: 12px; margin: 6px; border-radius: 8px; border: none; font-size: 16px; }
        input, select { width: 65%; background: #333; color: white; }
        button { background: #0a0; color: white; cursor: pointer; width: 28%; }
        button:hover { background: #0f0; }
        .seccion { margin: 40px 0; }
        h2 { color: #0af; }
        .canales { display: grid; grid-template-columns: repeat(auto-fit, minmax(420px, 1fr)); gap: 20px; }
        .item { background: #222; padding: 15px; border-radius: 12px; text-align: center; position: relative; }
        iframe { width: 100%; height: 300px; border-radius: 8px; border: 2px solid #444; }
        .eliminar { position: absolute; top: 10px; right: 10px; background: #c00; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🎥 Mi TV y Radio Personal 🎵</h1>

    <div class="formulario">
        <h2>Agregar LN+ en vivo</h2>
        <button onclick="agregarLNplus()" style="background:#06f; width:100%; padding:15px; font-size:18px;">Agregar LN+ en vivo (rápido)</button>
        <p style="color:#aaa; font-size:14px; margin-top:15px;">
            Si sigue saliendo "rechazó la conexión", la única solución confiable es subir la página a internet (te explico cómo si querés).
        </p>
    </div>

    <div class="seccion">
        <h2>📺 Mis Canales de TV</h2>
        <div id="lista-tv" class="canales"></div>
    </div>

    <script>
        function cargarItems() {
            const tv = document.getElementById('lista-tv');
            tv.innerHTML = '';

            const items = JSON.parse(localStorage.getItem('misCanales') || '[]');

            items.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'item';
                const contenido = `<iframe src="${item.url}" 
                    allowfullscreen 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>`;
                div.innerHTML = `<h3>${item.nombre}</h3>${contenido}<button class="eliminar" onclick="eliminarItem(${index})">Eliminar</button>`;
                tv.appendChild(div);
            });
        }

        function agregarLNplus() {
            const url = "https://www.youtube.com/embed/live_stream?channel=UCba3hpU7EFBSk817y9qZkiA";
            let items = JSON.parse(localStorage.getItem('misCanales') || '[]');
            items.push({ nombre: "LN+ en vivo", url: url, tipo: "tv" });
            localStorage.setItem('misCanales', JSON.stringify(items));
            cargarItems();
            alert("LN+ agregado. Refrescá con F5 y esperá 5 segundos.");
        }

        function eliminarItem(index) {
            if (confirm("¿Eliminar LN+?")) {
                let items = JSON.parse(localStorage.getItem('misCanales') || '[]');
                items.splice(index, 1);
                localStorage.setItem('misCanales', JSON.stringify(items));
                cargarItems();
            }
        }

        window.onload = cargarItems;
    </script>
</body>
</html>
